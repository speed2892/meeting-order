<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="집회순서">
<meta name="theme-color" content="#1a4a7a">
<meta name="format-detection" content="telephone=no">
<title>그리스도인 생활과 봉사</title>
<link id="pwaManifest" rel="manifest">
<link id="pwaIcon" rel="apple-touch-icon" href="./icon-jiboe-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f5;--surface:#fff;--surface2:#f3f0eb;
  --border:#e4dfd6;--text:#1a1612;--text2:#5c5448;--text3:#9c9080;
  --blue:#1a4a7a;--blue-light:#2e6fad;--blue-bg:#eaf2fc;
  --green:#2a6040;--green-bg:#e8f5ee;
  --purple:#5a2d82;--purple-bg:#f0eaf8;
  --gold:#8b6914;--gold-bg:#fdf5e0;
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:calc(80px + var(--safe-bottom))}

/* HEADER */
.app-header{background:var(--blue);color:white;padding:calc(14px + var(--safe-top)) 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);overflow:visible}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:relative;min-height:80px}
.app-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;line-height:1.3}
.app-title span{display:block;font-size:11px;font-weight:400;opacity:.75;font-family:'Noto Sans KR',sans-serif}
.date-badge{display:flex;flex-direction:column;align-items:center;gap:1px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.date-year{font-size:13px;font-weight:700;color:#ffd54f;opacity:.85;font-family:'Noto Sans KR',sans-serif}
.date-main{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:900;color:#ffd54f;line-height:1.1;letter-spacing:-.3px}
.date-week{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-top:2px}
.week-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.12);margin:8px -20px 0;padding:0 20px;-webkit-overflow-scrolling:touch}
.week-tabs::-webkit-scrollbar{display:none}
.week-tab{padding:9px 14px;font-size:12px;font-weight:500;color:rgba(255,255,255,.55);border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0}
.week-tab.active{color:white;border-bottom-color:#ffd54f}

.main{padding:14px 14px 0}

/* SECTION */
.section-header{display:flex;align-items:center;margin:20px 0 10px;border-radius:10px;overflow:hidden}
.section-label{font-size:15px;font-weight:700;padding:10px 16px;flex:1;font-family:'Noto Serif KR',serif}
.sec-treasure{background:linear-gradient(90deg,#fff3e0,#ffe8b8);border-left:5px solid #e65100}
.sec-treasure .section-label{color:#b34000}
.sec-field{background:linear-gradient(90deg,#e8f5ee,#c8ecd8);border-left:5px solid #2a6040}
.sec-field .section-label{color:#1a4a2e}
.sec-life{background:linear-gradient(90deg,#e3f0fc,#bcd8f5);border-left:5px solid #1a4a7a}
.sec-life .section-label{color:#0e3060}

/* SONG CARD */
.song-card{background:var(--gold-bg);border:1px solid #e8d080;border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.song-main{display:flex;align-items:center;gap:12px;padding:14px 16px}
.song-icon{width:36px;height:36px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.song-info{flex:1}
.song-type{font-size:10px;color:var(--gold);font-weight:600;letter-spacing:.05em;margin-bottom:2px}
.song-name{font-size:14px;font-weight:500;color:var(--text)}
.song-sub{font-size:12px;color:var(--text3);margin-top:2px}
.song-edit-panel{display:none;border-top:1px solid #e8d080;padding:14px 16px;background:#fffdf0}
.song-card.open .song-edit-panel{display:block}
.btn-edit-toggle{padding:6px 12px;background:rgba(139,105,20,.12);border:1px solid rgba(139,105,20,.25);border-radius:7px;font-size:12px;font-weight:500;color:var(--gold);cursor:pointer;font-family:inherit;flex-shrink:0}

/* PRAYER CARD */
.prayer-card{background:var(--purple-bg);border:1px solid #c8b0e4;border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.prayer-main{display:flex;align-items:center;gap:12px;padding:12px 16px}
.prayer-icon{width:32px;height:32px;border-radius:8px;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.prayer-label-text{font-size:10px;color:var(--purple);font-weight:600;letter-spacing:.05em}
.prayer-person{font-size:14px;font-weight:600;color:#6a22b0}
.prayer-edit-panel{display:none;border-top:1px solid #c8b0e4;padding:14px 16px;background:#faf5ff}
.prayer-card.open .prayer-edit-panel{display:block}
.btn-edit-toggle-purple{padding:6px 12px;background:rgba(90,45,130,.1);border:1px solid rgba(90,45,130,.25);border-radius:7px;font-size:12px;font-weight:500;color:var(--purple);cursor:pointer;font-family:inherit;flex-shrink:0}

/* ITEM CARD */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.item-card.type-treasure{border-left:3px solid #ff8c00}
.item-card.type-field{border-left:3px solid var(--green)}
.item-card.type-life{border-left:3px solid var(--blue)}
.item-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.type-toggle-row{display:flex;gap:3px;margin-bottom:2px}
.tt-btn{width:22px;height:22px;border-radius:5px;border:1.5px solid #ddd;background:#f5f2ec;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:.3;padding:0;touch-action:manipulation}
.tt-btn:active{opacity:.9}
.tt-on-treasure{opacity:1!important;background:#fdf0c0;border-color:#d4a020}
.tt-on-field{opacity:1!important;background:#e0f4e4;border-color:#2a8040}
.tt-on-life{opacity:1!important;background:#ece8f8;border-color:#5a3aaa}
.item-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.type-treasure .type-toggle-row{display:flex;gap:3px;margin-bottom:2px}
.tt-btn{width:22px;height:22px;border-radius:5px;border:1.5px solid #ddd;background:#f5f2ec;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:.3;padding:0;touch-action:manipulation}
.tt-btn:active{opacity:.9}
.tt-on-treasure{opacity:1!important;background:#fdf0c0;border-color:#d4a020}
.tt-on-field{opacity:1!important;background:#e0f4e4;border-color:#2a8040}
.tt-on-life{opacity:1!important;background:#ece8f8;border-color:#5a3aaa}
.item-num{background:#fff3e0;color:#e65100}
.type-field .type-toggle-row{display:flex;gap:3px;margin-bottom:2px}
.tt-btn{width:22px;height:22px;border-radius:5px;border:1.5px solid #ddd;background:#f5f2ec;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:.3;padding:0;touch-action:manipulation}
.tt-btn:active{opacity:.9}
.tt-on-treasure{opacity:1!important;background:#fdf0c0;border-color:#d4a020}
.tt-on-field{opacity:1!important;background:#e0f4e4;border-color:#2a8040}
.tt-on-life{opacity:1!important;background:#ece8f8;border-color:#5a3aaa}
.item-num{background:var(--green-bg);color:var(--green)}
.type-life .type-toggle-row{display:flex;gap:3px;margin-bottom:2px}
.tt-btn{width:22px;height:22px;border-radius:5px;border:1.5px solid #ddd;background:#f5f2ec;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:.3;padding:0;touch-action:manipulation}
.tt-btn:active{opacity:.9}
.tt-on-treasure{opacity:1!important;background:#fdf0c0;border-color:#d4a020}
.tt-on-field{opacity:1!important;background:#e0f4e4;border-color:#2a8040}
.tt-on-life{opacity:1!important;background:#ece8f8;border-color:#5a3aaa}
.item-num{background:var(--blue-bg);color:var(--blue)}
.item-info{flex:1;min-width:0}
.item-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;word-break:keep-all}
.item-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.item-person{font-size:12px;font-weight:500}
.type-treasure .item-person{color:#c45000}
.type-field .item-person{color:#2a7a4e}
.type-life .item-person{color:#1a5fbf}
.item-time{font-size:11px;padding:1px 7px;border-radius:50px;font-weight:500}
.type-treasure .item-time{background:#fff3e0;color:#e65100}
.type-field .item-time{background:var(--green-bg);color:var(--green)}
.type-life .item-time{background:var(--blue-bg);color:var(--blue)}
.item-preview{font-size:12px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chevron{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px;transition:transform .2s;flex-shrink:0;pointer-events:none}
.item-card.open .chevron{transform:rotate(180deg)}
.item-detail{display:none;border-top:1px solid var(--border);background:var(--surface2);padding:14px 16px}
.item-card.open .item-detail{display:block}

/* SOGGAL */
.soggal-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid #9c9080;border-radius:var(--radius);margin-bottom:10px;overflow:hidden}

/* EDIT */
.el{font-size:11px;color:var(--text3);letter-spacing:.04em;margin-bottom:5px;margin-top:10px}
.el:first-child{margin-top:0}
.ei,.et{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;font-family:inherit;outline:none;display:block;margin-bottom:0}
.ei:focus,.et:focus{border-color:var(--blue-light)}
.et{resize:none;line-height:1.6;min-height:100px}
.edit-row{display:flex;gap:8px}
.edit-row>div{flex:1}
.ea{display:flex;gap:8px;margin-top:12px}
.btn-s{flex:1;padding:10px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}
.btn-c{padding:10px 14px;background:var(--surface);color:var(--text3);border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer}

/* FAB */
.fab-area{position:fixed;bottom:calc(16px + var(--safe-bottom));right:16px;z-index:200;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.fab{display:flex;align-items:center;gap:8px;padding:12px 20px;background:var(--blue);color:white;border:none;border-radius:50px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.2);touch-action:manipulation}
.fab-print{background:#4a6a3a}

/* 가로 모드 최적화 */
@media(orientation:landscape) and (max-height:500px){
  .app-header{padding:calc(6px + var(--safe-top)) 16px 0}
  .header-top{min-height:52px;margin-bottom:6px}
  .app-title{font-size:12px}
  .date-main{font-size:14px}
  .date-week{font-size:16px}
  .date-year{font-size:10px}
  .week-tab{padding:6px 12px;font-size:11px}
  .main{padding:8px 16px 0}
  .section-label{font-size:13px;padding:7px 12px}
  .item-card,.song-card,.prayer-card{margin-bottom:6px}
  .item-header{padding:8px 12px}
  .item-title{font-size:13px}
  .item-num{width:28px;height:28px;font-size:12px}
  .fab-area{bottom:calc(8px + var(--safe-bottom));right:12px;flex-direction:row}
  .fab{padding:8px 14px;font-size:11px}
  body{padding-bottom:calc(60px + var(--safe-bottom))}
}

/* 태블릿/가로 큰화면 */
@media(min-width:700px){
  .main{max-width:700px;margin:0 auto}
  .app-header .header-top{max-width:700px;margin:0 auto}
}

/* TOAST */
.toast{position:fixed;bottom:calc(76px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:#222;color:white;padding:10px 20px;border-radius:50px;font-size:13px;z-index:500;pointer-events:none;opacity:0;transition:.2s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.item-card,.song-card,.prayer-card,.soggal-card{animation:fadeUp .2s ease both}

/* ── 인쇄 스타일 ── */
@media print{
  @page{size:A4 portrait;margin:12mm 10mm}
  /* 숨길 요소 */
  .app-header,.fab-area,.toast,._installBanner,#browserBanner,
  .item-detail,.song-edit-panel,.prayer-edit-panel,.item-detail,
  .scripture-edit-panel,.type-toggle-row,
  button.btn-edit-toggle,button.btn-edit-toggle-purple,
  .chevron,#_toast{display:none!important}
  /* 기본 */
  body{background:#fff!important;padding-bottom:0;font-size:10pt;color:#000}
  .main{padding:0;max-width:100%}
  /* 인쇄 제목 */
  .print-header{display:block!important}
  /* 섹션 */
  .section-header{break-inside:avoid;margin:8px 0 6px}
  .section-label{font-size:11pt;padding:6px 12px}
  .sec-treasure{background:#fff3e0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sec-field{background:#e8f5ee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sec-life{background:#f0eaf8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* 카드 */
  .item-card,.song-card,.prayer-card,.soggal-card{
    break-inside:avoid;margin-bottom:4px;border-radius:6px;
    animation:none!important;box-shadow:none!important
  }
  .item-header,.song-main,.prayer-main{padding:6px 10px}
  .item-title{font-size:10pt;font-weight:600}
  .item-person,.song-name,.prayer-person{font-size:9pt}
  .item-time,.song-sub{font-size:8pt}
  .item-num{width:24px;height:24px;font-size:10pt}
  /* 타입바 색상 유지 */
  .type-treasure{border-left-color:#e65100!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .type-field{border-left-color:#2a6040!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .type-life{border-left-color:#5a2d82!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* 노래/기도 */
  .song-card{background:#fdf5e0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .prayer-card{background:#eaf2fc!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="app-title">그리스도인 생활과 봉사</div>
    <div class="date-badge" id="dateBadge"></div>
  </div>
  <div class="week-tabs" id="weekTabs"></div>
  <div id="scripture-edit-panel" style="display:none;border-top:1px solid rgba(255,255,255,.15);padding:12px 16px 14px;background:rgba(0,0,0,.15)">
    <div style="font-size:11px;color:rgba(255,255,255,.7);margin-bottom:6px">성경 범위 편집</div>
    <input id="scripture-input" style="width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:9px 12px;color:white;font-size:13px;font-family:inherit;outline:none" placeholder="예: 이사야 41-42장">
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn-s" data-act="save-scripture" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)">저장</button>
      <button class="btn-c" data-act="close-scripture" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)">닫기</button>
    </div>
  </div>
</header>

<div class="print-header" style="display:none;text-align:center;padding:0 0 10px;border-bottom:2px solid #1a4a7a;margin-bottom:12px">
  <div style="font-family:'Noto Serif KR',serif;font-size:16pt;font-weight:900;color:#1a4a7a">그리스도인 생활과 봉사</div>
  <div id="printDate" style="font-size:11pt;color:#555;margin-top:4px"></div>
</div>
<div class="main" id="mainContent"></div>

<div class="fab-area">
  <button class="fab fab-print" onclick="window.print()">🖨 인쇄</button>
  <button class="fab" id="saveAllBtn">💾 저장</button>
</div>
<div class="toast" id="toastEl"></div>

<script>
const KEY = 'jwmeeting_v8';
const DEFAULT = [{
  id:'w1',label:'3월 2-8일',scripture:'이사야 41-42장',
  openSong:{num:'8번',name:'여호와는 우리의 도피처',ref:'시편 91편'},
  midSong:{num:'19번',name:'주의 만찬',ref:'마태복음 26장 26-30'},
  closeSong:{num:'110번',name:'여호와의 기쁨',ref:'느헤미야 8:10'},
  openPrayer:'윤정우',closePrayer:'오덕화 형제',
  soggal:{person:'',note:''},
  items:[
    {id:'i1',type:'treasure',num:1,title:'"두려워하지 마라"',person:'박동혁 형제',time:'10분',note:'성경에 담긴 보물 코너\n이사야 41-42장 기반 강연',detail:''},
    {id:'i2',type:'treasure',num:2,title:'영적 보물 찾기',person:'백문호 형제',time:'10분',note:'성경에 담긴 보물 코너',detail:''},
    {id:'i3',type:'treasure',num:3,title:'성경 낭독',person:'이희수 형제',time:'4분',note:'이사야 42:1-13\n\n【읽가 11과 - 열정】 로마서 12:11\n열정적으로 말하면 듣는 사람에게 힘을 주고 동기를 부여할 수 있습니다.\n\n• 먼저 내용이 자신의 마음에 이르게 한다\n• 듣는 사람에 대해 생각한다\n• 생기 있게 말한다',detail:''},
    {id:'i4',type:'field',num:4,title:'대화 시작하기 — 호별 방문',person:'전수민 자매 / 민영조 자매',time:'3분',note:'집주인이 기념식 초대장을 받고 관심을 보인다.\n\n【랑제 6과 요점 4】 지레짐작하지 마십시오.\n• 여호와와 예수께서는 사람들의 마음을 읽으실 수 있지만 우리에게는 그런 능력이 없습니다\n• 누구든 여호와의 자비를 받을 수 있습니다',detail:''},
    {id:'i5',type:'field',num:5,title:'대화 시작하기 — 비공식 증거',person:'최나연 자매 / 오가은 자매',time:'4분',note:'가족이나 친척을 기념식에 초대하고, jw.org를 사용해 가까운 곳에서 열리는 기념식 장소를 찾아본다.\n\n【랑제 3과 요점 5】 도움을 베푸십시오.\n실제적인 도움을 베풀 적절한 기회를 찾으십시오.',detail:''},

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function attr(s){return(s||'').replace(/"/g,'&quot;')}

function saveAll(){
  localStorage.setItem(KEY,JSON.stringify(weeks));

}

let _tt;
function toast(msg){
  const t=document.getElementById('toastEl');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);
}

// 이번 주 날짜 자동 계산 (월요일~일요일)
function getDateInfo(){
  const today = new Date();
  const day = today.getDay();
  const diffToMon = (day === 0) ? -6 : 1 - day;
  const mon = new Date(today); mon.setDate(today.getDate() + diffToMon);
  const sun = new Date(mon);   sun.setDate(mon.getDate() + 6);
  const y  = mon.getFullYear();
  const m1 = mon.getMonth()+1, d1 = mon.getDate();
  const m2 = sun.getMonth()+1, d2 = sun.getDate();
  const weekLabel = m1===m2 ? `${d1}-${d2}일` : `${d1}일-${m2}월${d2}일`;
  return { year: y, month: m1, weekLabel, monthLabel: `${m1}월` };
}

// ── 이벤트 (전역 1회 등록) ──
document.addEventListener('click', function(e){
  const el=e.target.closest('[data-act]');
  if(!el) return;
  const act=el.dataset.act;

  if(act==='quick-type'){
    const iid=el.dataset.iid, type=el.dataset.type;
    const item=weeks[idx].items.find(i=>i.id===iid);
    if(item){ item.type=type; saveAll(); render(); }
    return;
  }
  if(act==='save-scripture'){
    weeks[idx].scripture=document.getElementById('scripture-input').value.trim();
    saveAll(); render();
    document.getElementById('scripture-edit-panel').style.display='none';
    return;
  }
  if(act==='close-scripture'){
    document.getElementById('scripture-edit-panel').style.display='none';
    return;
  }
  if(act==='toggle-song'){
    document.getElementById('song-'+el.dataset.key).classList.toggle('open');
    return;
  }
  if(act==='save-song'){
    const key=el.dataset.key;
    const w=weeks[idx];
    const song=key==='open'?w.openSong:key==='mid'?w.midSong:w.closeSong;
    song.num=document.getElementById('sn-num-'+key).value.trim();
    song.name=document.getElementById('sn-name-'+key).value.trim();
    song.ref=document.getElementById('sn-ref-'+key).value.trim();
    saveAll(); render();
    return;
  }
  if(act==='toggle-prayer'){
    document.getElementById('prayer-'+el.dataset.key).classList.toggle('open');
    return;
  }
  if(act==='save-prayer'){
    const key=el.dataset.key;
    const w=weeks[idx];
    const name=document.getElementById('pr-name-'+key).value.trim();
    if(key==='open') w.openPrayer=name;
    else w.closePrayer=name;
    saveAll(); render();
    return;
  }
  if(act==='toggle-item'){
    document.getElementById('c-'+el.dataset.cid).classList.toggle('open');
    return;
  }
  if(act==='save-soggal'){
    weeks[idx].soggal={
      person:document.getElementById('sg-p').value.trim(),
      note:document.getElementById('sg-n').value
    };
    saveAll(); render();
    document.getElementById('c-soggal').classList.add('open');
    return;
  }
  if(act==='save-item'){
    const iid=el.dataset.iid;
    const item=weeks[idx].items.find(i=>i.id===iid);
    if(!item) return;
    document.querySelectorAll('[data-iid="'+iid+'"]').forEach(inp=>{
      if(inp.dataset.f) item[inp.dataset.f]=inp.value;
    });
    saveAll(); render();
    document.getElementById('c-'+iid).classList.add('open');
    return;
  }
});

<script>
// ── PWA 설치 지원 ──
(function initPWA(){
  // manifest 파일 참조
  document.getElementById('pwaManifest').href = './manifest-jiboe.json';

  // Service Worker 등록
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw-jiboe.js', {scope:'./'})
      .then(r => console.log('SW 등록:', r.scope))
      .catch(e => console.log('SW 실패:', e.message));
  }

  // 설치 배너
  let _prompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); _prompt = e;
    showBanner();
  });
  window.addEventListener('appinstalled', () => {
    hideBanner();
    const t=document.getElementById('_toast');
    if(t){ t.textContent='✅ 앱이 설치됐어요!'; t.style.opacity=1; setTimeout(()=>t.style.opacity=0,2500); }
  });

  function showBanner(){
    let b=document.getElementById('_installBanner');
    if(!b){
      b=document.createElement('div');
      b.id='_installBanner';
      b.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1a4a7a;color:#fff;padding:14px 16px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,.3)';
      b.innerHTML=`
        <div style="font-size:30px">📲</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px">앱으로 설치하기</div>
          <div style="font-size:12px;opacity:.75;margin-top:2px">홈 화면에 추가하면 앱처럼 사용해요</div>
        </div>
        <button onclick="doInstall()" style="background:#f0c030;color:#1a0a00;border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0">설치</button>
        <button onclick="hideBanner()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:9px 10px;font-size:12px;cursor:pointer;font-family:inherit">나중에</button>`;
      document.body.appendChild(b);
    }
    b.style.display='flex';
  }
  function hideBanner(){ const b=document.getElementById('_installBanner'); if(b) b.style.display='none'; }
  window.hideBanner=hideBanner;
  window.doInstall=async function(){
    if(!_prompt){ alert('브라우저 메뉴 → 홈 화면에 추가를 눌러주세요'); return; }
    _prompt.prompt();
    const {outcome}=await _prompt.userChoice;
    _prompt=null; hideBanner();
  };
})();
</script>
